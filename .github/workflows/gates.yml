# gates.yml — the REQUIRED check (ADR 0012): every char-budget/structure gate script, run on every
# PR and push to main. This is the enforcement layer ADR 0008/0009 record — the scripts exit
# nonzero on a violation, so any over-budget SKILL.md/reference/agent/ADR/CLAUDE.md fails the
# check. Mark `gates` required in Settings -> Branches (claude-review.yml stays advisory).
# Zero setup: the gate scripts are zero-dependency by design and run on the runner's
# preinstalled python3 + node.
name: gates

on:
  pull_request:
    # `edited` included so a title/body edit re-evaluates check-pr-body (ADR 0054) — without it a
    # post-run title edit merges on a stale green, and the guard's "reword the title" remedy
    # could never clear a red.
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skill gate — validate.py over every skill (frontmatter, body/reference caps, emoji)
        run: |
          for d in skills/*/ pdca-workflow/skills/*/ skill-bench/skills/*/; do
            echo "== $d"
            python3 skills/building-skills/scripts/validate.py "$d"
          done

      - name: validate.py decision-logic tests
        run: cd skills/building-skills/scripts && python3 validate_test.py

      - name: "skill-bench harness tests — every lib + command script's decision logic"
        # script mode never collects a class below unittest.main(), so the reachability guard
        # runs first over every dir this workflow executes *_test.py from (#194)
        run: |
          set -e
          python3 skill-bench/scripts/lib/check_reachability.py skill-bench/scripts skill-bench/scripts/lib skills/building-skills/scripts
          for t in skill-bench/scripts/*_test.py skill-bench/scripts/lib/*_test.py; do
            echo "== $t"
            python3 "$t"
          done

      - name: JS gate tests (char budgets + adr-lint decision logic)
        # unquoted so the shell expands the glob — works on every node version
        run: node --test pdca-workflow/scripts/*.test.mjs scripts/*.test.mjs skill-bench/scripts/*.test.mjs

      - name: "check-gate-tests — every wired gate/hook has a CI-visible decision-logic test (ADR 0047)"
        run: node scripts/check-gate-tests.mjs

      - name: adr-lint — ADR structure + ADR/CLAUDE.md/agent char budgets
        run: node pdca-workflow/scripts/adr-lint.mjs docs/decisions

      - name: hook decision-logic tests (plugin + repo)
        run: |
          set -e
          for t in pdca-workflow/hooks/test-*.sh .claude/hooks/test-*.sh; do
            echo "== $t"
            bash "$t"
          done

      - name: "check-workflow — benchmark workflow syntax + model: on every agent() call"
        run: |
          node scripts/check-workflow.mjs benchmarks
          node scripts/check-workflow.mjs skill-bench

      - name: "check-restatement — no cross-file literal restatement in markdown (ADR 0046)"
        run: node scripts/check-restatement.mjs

      - name: "check-pr-body — no closing-keyword title on a declared-partial fix (ADR 0054)"
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-body.mjs

      - name: "adr decision-set advisory — cite-unconnected new ADRs WARN, never fail (ADR 0051)"
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          NEW=$(git diff --diff-filter=A --name-only "origin/$GITHUB_BASE_REF" HEAD -- docs/decisions/ | tr '\n' ',')
          node pdca-workflow/scripts/adr-lint.mjs docs/decisions --new-adrs="$NEW"

      - name: "check-references — an external ref added to the corpus carries a fetch-audit record (ADR 0079)"
        if: github.event_name == 'pull_request'
        run: |
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          node scripts/check-references.mjs "origin/$GITHUB_BASE_REF"

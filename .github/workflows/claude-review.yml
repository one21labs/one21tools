# Advisory muda / judgment review (optional, opt-in). Runs Claude Code headless on each PR and
# posts findings as ONE comment. ADVISORY ONLY — it never sets a failing check and never blocks the
# merge; keep your own test workflow as the only required check (set it required in repo
# Settings -> Branches). This is the unprompted forcing-function that fires the muda/one-home/drift
# check on every PR, complementing the in-session /retrospect reminder hook.
#
# /pdca-init copies this into .github/workflows/ on request. It is a TEMPLATE: it only works on
# GitHub + needs out-of-band secret setup, so it is never auto-wired. To activate:
#   1. Generate a Claude Pro/Max OAuth token once: `claude setup-token` (1-year token; NO
#      pay-per-use API key needed).
#   2. Store it as the repo secret CLAUDE_CODE_OAUTH_TOKEN.
#   3. Keep your test workflow as the only required check in branch protection.
# Until the secret exists the job skips cleanly (not a failure): a `secrets` value can't be read in
# a job-level `if`, so a gate STEP checks the env and toggles the rest of the job.
name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the OAuth token (skip cleanly when the secret is absent — not a failure)
        id: gate
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "No CLAUDE_CODE_OAUTH_TOKEN secret set — skipping the advisory review (this is not a failure)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude advisory muda review
        if: steps.gate.outputs.ok == 'true'
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Post the review via the default Actions token (the job already has
          # pull-requests: write). Without this the action falls back to the GitHub
          # App OIDC flow, which needs `id-token: write` + the app installed and
          # otherwise dies with "Could not fetch an OIDC token", turning the
          # advisory check red. Explicit token = no OIDC, works with the OAuth setup.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Bash is DISABLED by default in the action (issue #253: the review ran
          # 21 turns but its 5 attempts to read the diff / post the comment were all
          # denied, so the check went green with ZERO comments on 4 straight PRs —
          # silence indistinguishable from a clean diff). Grant the minimum the
          # prompt requires: read the diff, post ONE comment. Nothing else.
          claude_args: |
            --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"
          prompt: |
            Review ONLY this PR's diff. Flag muda per CLAUDE.md — duplicated logic,
            dead code or fields, premature abstraction, one-home / SSoT violations,
            drift — and any obvious correctness bug. One-home includes RESTATEMENT:
            an added line that repeats (even reworded) a fact whose home is a
            lower-altitude file — e.g. a README or ADR retelling a rule a skill
            reference or script owns — is a violation; it should cite, not restate.
            Be terse: cite file:line, group
            findings, skip nits. Post a single PR comment (gh pr comment). This is
            ADVISORY: never block the merge; if the diff is clean, say so in one line.

      # Diagnosability (issue #253): the execution log is the only witness to
      # in-runner permission denials — upload it every run so a silent review is
      # never undiagnosable again.
      - name: Upload execution log
        if: steps.gate.outputs.ok == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-execution-log
          path: ${{ steps.review.outputs.execution_file }}
          if-no-files-found: ignore
